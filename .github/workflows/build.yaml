name: build-all

on:
  workflow_dispatch:

jobs:
  # First build and push base images (only if changed)
  check-base:
    runs-on: ubuntu-latest
    outputs:
      debian: ${{ steps.changes.outputs.debian }}
      alpine: ${{ steps.changes.outputs.alpine }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for base image changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            debian:
              - 'docker/base-debian.Dockerfile'
              - 'docker/base-alpine.Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
            alpine:
              - 'docker/base-debian.Dockerfile'
              - 'docker/base-alpine.Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'

  build-base-debian:
    needs: check-base
    if: needs.check-base.outputs.debian == 'true'
    uses: ./.github/workflows/build-base-debian.yaml

  build-base-alpine:
    needs: check-base
    if: needs.check-base.outputs.alpine == 'true'
    uses: ./.github/workflows/build-base-alpine.yaml

  # Build main images in parallel
  debian:
    needs: [build-base-debian, check-base]
    if: always() && (needs.build-base-debian.result == 'success' || needs.build-base-debian.result == 'skipped')
    uses: ./.github/workflows/build-debian.yaml

  alpine:
    needs: [build-base-alpine, check-base]
    if: always() && (needs.build-base-alpine.result == 'success' || needs.build-base-alpine.result == 'skipped')
    uses: ./.github/workflows/build-alpine.yaml
