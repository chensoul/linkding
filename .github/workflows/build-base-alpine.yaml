name: build-base-alpine

on:
  workflow_dispatch:
  workflow_call:

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  build-base:
    runs-on: ubuntu-24.04-8-cores
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
          persistent: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          cache-binary: true
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Get version
        id: get_version
        run: echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Build and push base-alpine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/base-alpine.Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            zhijunio/linkding:base-alpine
            zhijunio/linkding:${{ steps.get_version.outputs.version }}-base-alpine
            ghcr.io/zhijunio/linkding:base-alpine
            ghcr.io/zhijunio/linkding:${{ steps.get_version.outputs.version }}-base-alpine
          push: true
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=alpine-base
          cache-to: |
            type=gha,scope=alpine-base,mode=max
